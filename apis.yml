aid: log10
name: Log10
description: 'Log10 is an LLMOps platform that provides REST API and SDK capabilities
  for capturing, logging, and managing LLM completions across major providers such
  as OpenAI, Anthropic, Google Gemini, Mistral, and Meta Llama. The platform enables
  engineering teams to debug prompt chains, run automated evaluations, collect human
  and AI-generated feedback, and benchmark model outputs at scale. Log10 supports
  session-based tracing, tag-based filtering, and cost tracking to help organizations
  optimize accuracy and operational efficiency of their generative AI applications.
  Developers can integrate via a Python SDK, TypeScript SDK, or directly via the REST
  and GraphQL API using an API token and organization ID.

  '
